name: Release Debian Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-deb:
    name: Build Debian package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Debian installer
        uses: actions/checkout@v4

      - name: Install base build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            devscripts \
            fakeroot \
            dpkg-dev

      - name: Install package build-deps
        working-directory: adpki-installer
        run: |
          sudo apt-get build-dep -y ./

      - name: Verify build dependencies
        working-directory: adpki-installer
        run: |
          dpkg -l build-essential | tail -1
          dpkg-checkbuilddeps

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Update Debian changelog version
        working-directory: adpki-installer
        env:
          DEBEMAIL: danakiranali@gmail.com
          DEBFULLNAME: Ali Danakiran
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          if [ -f debian/changelog ]; then
            dch --newversion "$VERSION" \
              --distribution stable \
              --force-distribution \
              "Release version $VERSION"
          fi

      - name: Build Debian package
        working-directory: adpki-installer
        run: |
          fakeroot dpkg-buildpackage -us -uc -b

      - name: Collect package files
        run: |
          mkdir -p release

          find . -maxdepth 1 -type f -name "*.deb"       -exec cp {} release/ \;
          find . -maxdepth 1 -type f -name "*.buildinfo" -exec cp {} release/ \;
          find . -maxdepth 1 -type f -name "*.changes"   -exec cp {} release/ \;

          cd release

          VERSIONED_DEB="$(find . -maxdepth 1 -type f -name 'adpki_*_amd64.deb' | head -n1)"

          if [ -z "$VERSIONED_DEB" ]; then
            echo "No amd64 Debian package found."
            exit 1
          fi

          cp "$VERSIONED_DEB" adpki_amd64.deb

          sha256sum \
            "$(basename "$VERSIONED_DEB")" \
            adpki_amd64.deb \
            > SHA256SUMS

          ls -lah

      - name: Upload package to central AD-PKI release
        env:
          GH_TOKEN: ${{ secrets.ADPKI_RELEASE_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          gh release view "$TAG" \
            --repo alid-it/AD-PKI \
          || gh release create "$TAG" \
            --repo alid-it/AD-PKI \
            --title "AD-PKI $TAG" \
            --notes "Central AD-PKI release $TAG"

          gh release upload "$TAG" \
            release/*.deb \
            release/SHA256SUMS \
            --repo alid-it/AD-PKI \
            --clobber
