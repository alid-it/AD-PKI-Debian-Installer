server {
    listen 80;
    server_name _;

    root /opt/adpki/frontend/dist;
    index index.html;

    access_log /var/log/adpki/nginx/access.log;
    error_log  /var/log/adpki/nginx/error.log;

    client_max_body_size 50M;

    # Frontend Runtime Config
    location = /config.js {
        default_type application/javascript;
        try_files /config.js =404;
    }

    # ACME direkt an CA-Core weiterleiten
    location ^~ /acme/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
    }

    # Laravel API
    location ^~ /api {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/adpki-fpm.sock;

        fastcgi_param SCRIPT_FILENAME /opt/adpki/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /opt/adpki/backend/public;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param HTTPS off;
    }

    # OCSP / Timestamp / CRL über Laravel-Routen
    location = /ocsp {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/adpki-fpm.sock;

        fastcgi_param SCRIPT_FILENAME /opt/adpki/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /opt/adpki/backend/public;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param HTTPS off;
    }

    location = /timestamp {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/adpki-fpm.sock;

        fastcgi_param SCRIPT_FILENAME /opt/adpki/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /opt/adpki/backend/public;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param HTTPS off;
    }

    location ^~ /crl/ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/adpki-fpm.sock;

        fastcgi_param SCRIPT_FILENAME /opt/adpki/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /opt/adpki/backend/public;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param HTTPS off;
    }

    # Vue SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /.well-known/acme-challenge/ {
    proxy_pass http://127.0.0.1:8080;
    }

    # Schutz versteckter Dateien
    location ~ /\.(?!well-known).* {
        deny all;
    }
}