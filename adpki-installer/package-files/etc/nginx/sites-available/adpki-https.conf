server {
    listen 80;
    server_name __DOMAIN__;

    # ACME Challenge – AD-PKI CA-Core (für certbot renew)
    location ^~ /.well-known/acme-challenge/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name __DOMAIN__;

    ssl_certificate     __CERT_PATH__;
    ssl_certificate_key __KEY_PATH__;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /opt/adpki/frontend/dist;
    index index.html;

    access_log /var/log/adpki/nginx/access.log;
    error_log  /var/log/adpki/nginx/error.log;

    client_max_body_size 50M;

    location = /config.js {
        default_type application/javascript;
        try_files /config.js =404;
    }

    location ^~ /acme/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location ^~ /.well-known/acme-challenge/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /api {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/adpki-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /opt/adpki/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /opt/adpki/backend/public;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param HTTPS on;
    }

    location = /ocsp {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/adpki-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /opt/adpki/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /opt/adpki/backend/public;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param HTTPS on;
    }

    location = /timestamp {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/adpki-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /opt/adpki/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /opt/adpki/backend/public;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param HTTPS on;
    }

    location ^~ /crl/ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/adpki-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /opt/adpki/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /opt/adpki/backend/public;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param HTTPS on;
    }

    location /app {
        proxy_pass http://127.0.0.1:6001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}